name: Update Customer Map

on:
  # 毎日 朝6:00 JST (= 前日 21:00 UTC) に自動実行
  schedule:
    - cron: "0 21 * * *"
  # 手動実行も可能
  workflow_dispatch:

# customers.json をコミットするために書き込み権限が必要
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build customers.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          # 郵便番号CSVに無い住所のフォールバック用（任意・未設定でも動作）
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          python -m customer.build_customer_data --spreadsheet-id "$SPREADSHEET_ID"

      - name: Commit and push updated customers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/customers.json
          git diff --cached --quiet || git commit -m "Auto-update customers.json [$(date -u '+%Y-%m-%d')]"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::来店客データの更新に失敗しました。スプレッドシート共有設定やSecretsを確認してください。"
